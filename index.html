<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Market - İlan Ver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top, #1e293b 0%, #080c14 100%); min-height: 100vh; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input:focus { border-color: #eab308 !important; outline: none; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body>
    <nav class="p-5 border-b border-slate-800 bg-[#0f172a]/90 text-center text-xl font-black italic text-yellow-500 uppercase">
        PUBG Mobile <span class="text-white">TM</span>
    </nav>

    <div class="max-w-xl mx-auto my-10 p-4 text-center">
        <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl">
            <h2 class="text-3xl font-black mb-2 uppercase tracking-tight">İlan Formu</h2>
            <p class="text-slate-400 text-sm italic mb-8 px-4">Lütfen tüm bilgileri eksiksiz doldurun. Telefon numarası iletişim için zorunludur.</p>
            
            <form action="https://formspree.io/f/mnjglkkl" method="POST" class="space-y-4 text-left">
                <div>
                    <label class="block text-[11px] font-black text-slate-500 uppercase mb-2 ml-2 tracking-widest">E-posta Adresiniz</label>
                    <input type="email" name="email" required class="w-full bg-[#070b14] border border-slate-700 rounded-2xl p-4 transition-all" placeholder="ornek@mail.com">
                </div>

                <div>
                    <label class="block text-[11px] font-black text-yellow-500 uppercase mb-2 ml-2 tracking-widest">Telefon Numaranız (Link messenger/İMO)</label>
                    <input type="tel" name="phone" required class="w-full bg-[#070b14] border border-slate-700 rounded-2xl p-4 transition-all" placeholder="+993 61 234567">
                </div>

                <div>
                    <label class="block text-[11px] font-black text-slate-500 uppercase mb-2 ml-2 tracking-widest">Oyuncu ID (Karakter ID)</label>
                    <input type="text" name="playerID" required class="w-full bg-[#070b14] border border-slate-700 rounded-2xl p-4" placeholder="512345678">
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-blue-400 uppercase mb-1 ml-1 text-center">Oyuncu LvL</label>
                        <input type="number" name="playerLevel" required min="1" max="100" class="w-full bg-[#070b14] border border-slate-700 rounded-2xl p-3 text-center text-sm" placeholder="1-100">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-green-400 uppercase mb-1 ml-1 text-center">Evo LvL</label>
                        <input type="number" name="evoLevel" required min="1" max="100" class="w-full bg-[#070b14] border border-slate-700 rounded-2xl p-3 text-center text-sm" placeholder="1-100">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-purple-400 uppercase mb-1 ml-1 text-center">Koleksiyon</label>
                        <input type="number" name="collectionLevel" required min="1" max="101" class="w-full bg-[#070b14] border border-slate-700 rounded-2xl p-3 text-center text-sm" placeholder="1-101">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-black text-yellow-500 uppercase mb-2 ml-2 tracking-widest text-center">Hesap Fiyatı (TMT)</label>
                    <input type="number" name="price" required min="0" class="w-full bg-[#070b14] border border-yellow-500/20 rounded-2xl p-4 text-yellow-500 font-bold text-center text-xl" placeholder="Fiyat Girin (Takas ise 0)">
                </div>
                
                <div class="bg-yellow-500/10 p-4 rounded-2xl text-[10px] text-yellow-200/70 italic border border-yellow-500/20 leading-relaxed text-center">
                    🚨 <strong>DİKKAT:</strong> İlan vermek ücretlidir. Ödeme ve onay süreci için iletişim bilgilerinizden size ulaşılacaktır.
                </div>

                <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-5 rounded-2xl transition-all shadow-lg uppercase text-lg active:scale-95">
                    İlanı Gönder
                </button>
            </form>
        </div>
    </div>
</body>
</html>
